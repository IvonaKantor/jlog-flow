openapi: 3.0.3
info:
  title: Logging Platform API
  version: 1.0.0
  description: API для управления логами и их анализа

paths:
  /v1/log:
    get:
      summary: Get a list of logs
      description: Returns a list of logs
      parameters:
        - name: serviceId
          in: query
          schema:
            type: string
          description: Service ID
        - name: serviceName
          in: query
          schema:
            type: string
          description: Service name
        - name: hostName
          in: query
          schema:
            type: string
          description: Host name (exact match)
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
          description: Start timestamp (inclusive), ISO 8601 date or date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
          description: End timestamp (inclusive), ISO 8601 date or date-time
        - name: level
          in: query
          schema:
            $ref: '#/components/schemas/LogLevel'
          description: Logging level for filtering
        - name: search
          in: query
          schema:
            type: string
            maxLength: 50
          description: Free-text search across log keywords
      responses:
        '200':
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaginationDataLog'
        '500':
          description: Server error

  /v1/log/search:
    post:
      summary: Search logs with filters
      description: Returns logs filtered by payload values including date range
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSearchRequest'
      responses:
        '200':
          description: Filtered list of logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationDataLog'
        '400':
          description: Invalid request payload
        '500':
          description: Server error

components:
  schemas:
    PaginationDataLog:
      type: object
      description: Page wrapper
      properties:
        pageIndex:

          type: integer
        pageSize:
          type: integer
        pageCount:
          type: integer
        totalCount:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/Log'
    Log:
      type: object
      description: incoming message skeleton :)
      properties:
        timestamp:
          type: string
          format: date-time
        sequence:
          type: integer
        loggerClassName:
          type: string
        loggerName:
          type: string
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
        threadName:
          type: string
        threadId:
          type: integer
        ndc:
          type: string
        mdc:
          type: object
          additionalProperties:
            type: object
        hostName:
          type: string
        processName:
          type: string
        processId:
          type: integer
        exception:
          $ref: '#/components/schemas/LogException'
        serviceName:
          type: string
        serviceId:
          type: string
    LogLevel:
      type: string
      enum:
        - INFO
        - WARN
        - ERROR
        - DEBUG
      description: Log levels
    LogException:
      type: object
      description: Exception type
      properties:
        refIid:
          type: integer
        exceptionType:
          type: string
        message:
          type: string
        frames:
          type: array
          items:
            $ref: '#/components/schemas/ExceptionFrame'
    ExceptionFrame:
      type: object
      properties:
        clazz:
          type: string
          description: The class with exception
        method:
          type: string
          description: The method with exception
        line:
          type: integer
          description: The line with exception

    LogSearchRequest:
      type: object
      properties:
        search:
          type: string
          maxLength: 50
        serviceIds:
          type: array
          items:
            type: string
        serviceNames:
          type: array
          items:
            type: string
        hostName:
          type: string
        fromDate:
          type: string
          format: date-time
          description: Start timestamp (inclusive), ISO-8601 date or date-time
        toDate:
          type: string
          format: date-time
          description: End timestamp (inclusive), ISO-8601 date or date-time
        level:
          $ref: '#/components/schemas/LogLevel'
        pageIndex:
          type: integer
          minimum: 0
          default: 0
        pageSize:
          type: integer
          minimum: 1
          maximum: 500
          default: 20